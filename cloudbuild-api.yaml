steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -f
      - docker/Dockerfile.api
      - -t
      - europe-west1-docker.pkg.dev/prisme-wamba-2026/prisme-docker/prisme-api:latest
      - .
images:
  - europe-west1-docker.pkg.dev/prisme-wamba-2026/prisme-docker/prisme-api:latest
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
